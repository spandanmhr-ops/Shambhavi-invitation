<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Shambhavi's Annaprashan Invitation</title>
    <meta property="og:title" content="Shambhavi's Annaprashan Invitation 🌸">
    <meta property="og:description" content="✉️ Tap to open your interactive invitation envelope and view the venue location!">
    <meta property="og:image" content="https://spandanmhr-ops.github.io/Shambhavi-invitation/watermarked_img_10522389305830531999.png">
    <meta property="og:url" content="https://spandanmhr-ops.github.io/Shambhavi-invitation/">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg-color: #f7e6e9;
            --envelope-bg: #f2cbd2;
            --envelope-inside: #e0a3ad;
            --btn-color: #c46274;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f7e6e9 0%, #fcedf0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .bg-sparkle {
            position: absolute;
            background: rgba(244, 162, 97, 0.25);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 8s infinite linear;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            z-index: 5;
            position: relative;
        }

        .envelope-wrapper {
            position: relative;
            width: 340px;
            height: 240px;
            cursor: pointer;
            margin-top: 200px;
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--envelope-inside);
            z-index: 1;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px rgba(196,98,116,0.25);
        }

        /* HARD LOCKED DOWN DEFAULT STATE: Hidden entirely from system rendering engines */
        .card-container {
            display: none; 
            position: absolute;
            top: 10px;
            left: 20px;
            width: 300px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            overflow: hidden;
            text-align: center;
            z-index: 2;
            opacity: 0;
            transform: translateY(120px) scale(0.9);
            pointer-events: none;
        }

        .invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .action-area {
            padding: 12px 10px;
            background: #fff8f9;
            border-top: 1px solid #f2d6db;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #c46274 0%, #b34e60 100%);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(196,98,116,0.4);
        }

        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            top: 0;
            left: 0;
            border-left: 170px solid #f9dae0;
            border-right: 170px solid #f9dae0;
            border-bottom: 120px solid #f4cbd2;
            border-top: 120px solid transparent;
            z-index: 3;
            border-radius: 0 0 10px 10px;
            pointer-events: none;
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 130px solid var(--envelope-bg);
            transform-origin: top;
            z-index: 4;
            transition: transform 0.5s ease, z-index 0.2s ease;
        }

        .heart-seal {
            position: absolute;
            top: 110px;
            left: 153px;
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #c46274 0%, #9e3f50 100%);
            transform: rotate(-45deg);
            z-index: 5;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .heart-seal::before, .heart-seal::after {
            content: "";
            position: absolute;
            width: 34px;
            height: 34px;
            background: inherit;
            border-radius: 50%;
        }
        .heart-seal::before { top: -17px; left: 0; }
        .heart-seal::after { left: 17px; top: 0; }

        .tap-text {
            position: absolute;
            bottom: -45px;
            width: 100%;
            text-align: center;
            color: var(--btn-color);
            font-weight: bold;
            font-size: 15px;
            z-index: 10;
            animation: subtleBounce 2s infinite ease-in-out;
        }

        @keyframes subtleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* --- STATE TRIGGER RUN CLASSES --- */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .heart-seal {
            opacity: 0;
            transform: scale(0);
        }

        /* Active styling applied explicitly via JavaScript timing logic */
        .envelope-wrapper.reveal-card .card-container {
            display: block; /* Turn it on right when the flap pulls back */
        }

        .envelope-wrapper.slide-card .card-container {
            transform: translateY(-380px) scale(1.05);
            z-index: 10;
            pointer-events: auto;
            opacity: 1;
        }

        .envelope-wrapper.open .tap-text {
            display: none;
        }

        .confetti {
            position: absolute;
            width: 9px;
            height: 9px;
            z-index: 99;
            border-radius: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
            <div class="envelope-back"></div>
            <div class="flap"></div>
            <div class="envelope-front"></div>
            <div class="heart-seal"></div>
            <div class="tap-text">✉️ Tap to open invitation</div>

            <div class="card-container" id="invitationCard" onclick="event.stopPropagation();">
                <a href="https://maps.app.goo.gl/1VX1vhAUfNKH4Dqk6?g_st=iw" target="_blank">
                    <img src="watermarked_img_10522389305830531999.png" alt="Invitation" class="invitation-img">
                </a>
                <div class="action-area">
                    <a href="https://maps.app.goo.gl/1VX1vhAUfNKH4Dqk6?g_st=iw" target="_blank" class="btn">📍 Open Google Maps</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ambient background loops
        window.addEventListener('DOMContentLoaded', () => {
            const colors = ['#f4cbd2', '#f9dae0', '#ffffff', '#fcdfd3'];
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.classList.add('bg-sparkle');
                const size = Math.random() * 12 + 6;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = Math.random() * 5 + 5 + 's';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(particle);
            }
        });

        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            if (envelope.classList.contains('open')) return;
            
            // 1. Instantly flip open envelope flap configuration 
            envelope.classList.add('open');
            
            // 2. Wait 150ms for flap to swing halfway clear, then make card exist in HTML space safely out of sight
            setTimeout(() => {
                envelope.classList.add('reveal-card');
                
                // 3. Immediately trigger upward physics transition glide frame
                setTimeout(() => {
                    envelope.classList.add('slide-card');
                }, 50);
            }, 150);

            setTimeout(createConfettiBurst, 250);
        }

        function createConfettiBurst() {
            const colors = ['#f4a261', '#e76f51', '#2a9d8f', '#e9c46a', '#c46274', '#ffffff'];
            const burstCount = 75;

            for (let i = 0; i < burstCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                if (Math.random() > 0.4) confetti.style.borderRadius = '50%';
                
                confetti.style.left = '50vw';
                confetti.style.top = '50vh';
                document.body.appendChild(confetti);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 12;
                let xSpeed = Math.cos(angle) * velocity;
                let ySpeed = Math.sin(angle) * velocity - 10;
                
                let currentX = window.innerWidth / 2;
                let currentY = window.innerHeight * 0.50;
                const rotationSpeed = (Math.random() - 0.5) * 40;
                let currentRotation = Math.random() * 360;

                const interval = setInterval(() => {
                    ySpeed += 0.4;
                    xSpeed *= 0.97;
                    currentX += xSpeed;
                    currentY += ySpeed;
                    currentRotation += rotationSpeed;

                    confetti.style.left = currentX + 'px';
                    confetti.style.top = currentY + 'px';
                    confetti.style.transform = `rotate(${currentRotation}deg)`;

                    if (currentY >= window.innerHeight - 15) {
                        clearInterval(interval);
                        confetti.style.top = (window.innerHeight - 12) + 'px';
                        setTimeout(() => {
                            confetti.style.transition = 'opacity 1s ease';
                            confetti.style.opacity = '0';
                            setTimeout(() => confetti.remove(), 1000);
                        }, 3500);
                    }
                }, 20);
            }
        }
    </script>

</body>
</html>
