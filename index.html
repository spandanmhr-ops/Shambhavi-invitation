<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Shambhavi's Annaprashan Invitation</title>
    <meta property="og:title" content="Shambhavi's Annaprashan Invitation 🌸">
    <meta property="og:description" content="✉️ Tap to open your interactive invitation envelope and view the venue location!">
    <meta property="og:image" content="https://spandanmhr-ops.github.io/Shambhavi-invitation/watermarked_img_10522389305830531999.png">
    <meta property="og:url" content="https://spandanmhr-ops.github.io/Shambhavi-invitation/">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg-color: #f7e6e9;
            --envelope-bg: #f2cbd2;
            --envelope-inside: #e0a3ad;
            --btn-color: #c46274;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            z-index: 2;
        }

        .envelope-wrapper {
            position: relative;
            width: 340px;
            height: 240px;
            cursor: pointer;
            margin-top: 260px;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--envelope-inside);
            z-index: 1;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card-container {
            position: absolute;
            top: 10px;
            left: 20px;
            width: 300px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            z-index: 2;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
            transform: translateY(120px) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }

        .invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .action-area {
            padding: 12px 10px;
            background: #fff8f9;
            border-top: 1px solid #f2d6db;
        }

        .btn {
            display: inline-block;
            background-color: var(--btn-color);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
        }

        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            top: 0;
            left: 0;
            border-left: 170px solid #f9dae0;
            border-right: 170px solid #f9dae0;
            border-bottom: 120px solid #f4cbd2;
            border-top: 120px solid transparent;
            z-index: 3;
            border-radius: 0 0 10px 10px;
            pointer-events: none;
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 130px solid var(--envelope-bg);
            transform-origin: top;
            z-index: 4;
            transition: transform 0.5s ease, z-index 0.2s ease;
        }

        .heart-seal {
            position: absolute;
            top: 110px;
            left: 153px;
            width: 34px;
            height: 34px;
            background-color: var(--btn-color);
            transform: rotate(-45deg);
            z-index: 5;
            transition: all 0.3s ease;
        }
        .heart-seal::before, .heart-seal::after {
            content: "";
            position: absolute;
            width: 34px;
            height: 34px;
            background-color: var(--btn-color);
            border-radius: 50%;
        }
        .heart-seal::before { top: -17px; left: 0; }
        .heart-seal::after { left: 17px; top: 0; }

        .tap-text {
            position: absolute;
            bottom: -45px;
            width: 100%;
            text-align: center;
            color: var(--btn-color);
            font-weight: bold;
            font-size: 15px;
            z-index: 10;
        }

        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .heart-seal {
            opacity: 0;
            transform: scale(0);
        }

        .envelope-wrapper.open .card-container {
            transform: translateY(-400px) scale(1.05);
            z-index: 10;
            pointer-events: auto;
            opacity: 1;
        }

        .envelope-wrapper.open .tap-text {
            display: none;
        }

        /* Confetti piece styling */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 99;
            border-radius: 3px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
            <div class="envelope-back"></div>
            <div class="flap"></div>
            <div class="envelope-front"></div>
            <div class="heart-seal"></div>
            <div class="tap-text">✉️ Tap to open invitation</div>

            <div class="card-container" onclick="event.stopPropagation();">
                <a href="https://maps.app.goo.gl/1VX1vhAUfNKH4Dqk6?g_st=iw" target="_blank">
                    <img src="watermarked_img_10522389305830531999.png" alt="Invitation" class="invitation-img">
                </a>
                <div class="action-area">
                    <a href="https://maps.app.goo.gl/1VX1vhAUfNKH4Dqk6?g_st=iw" target="_blank" class="btn">📍 Open Google Maps</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            if (envelope.classList.contains('open')) return;

            envelope.classList.add('open');
            
            // Trigger confetti burst slightly after flap opens
            setTimeout(createConfettiBurst, 200);
        }

        function createConfettiBurst() {
            const colors = ['#f4a261', '#e76f51', '#2a9d8f', '#e9c46a', '#c46274', '#ffffff'];
            const burstCount = 80; // Total number of confetti pieces

            for (let i = 0; i < burstCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Random color, shape variation
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                if (Math.random() > 0.5) confetti.style.borderRadius = '50%'; // Make some round
                
                // Spawn position (from middle area where envelope opens)
                confetti.style.left = '50vw';
                confetti.style.top = '55vh';
                
                document.body.appendChild(confetti);

                // Calculate random launch angles and drift speeds
                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 15;
                let xSpeed = Math.cos(angle) * velocity;
                let ySpeed = Math.sin(angle) * velocity - 10; // Strong upward trajectory bump
                
                let currentX = window.innerWidth / 2;
                let currentY = window.innerHeight * 0.55;
                const rotationSpeed = (Math.random() - 0.5) * 30;
                let currentRotation = Math.random() * 360;

                // Animate physics frame-by-frame
                const interval = setInterval(() => {
                    ySpeed += 0.4; // Gravity simulation dragging pieces down
                    xSpeed *= 0.98; // Air resistance slow down
                    
                    currentX += xSpeed;
                    currentY += ySpeed;
                    currentRotation += rotationSpeed;

                    confetti.style.left = currentX + 'px';
                    confetti.style.top = currentY + 'px';
                    confetti.style.transform = `rotate(${currentRotation}deg)`;

                    // Stop and settle at bottom of browser window
                    if (currentY >= window.innerHeight - 15) {
                        clearInterval(interval);
                        confetti.style.top = (window.innerHeight - 12) + 'px';
                        
                        // Slowly fade the settled confetti away after 4 seconds
                        setTimeout(() => {
                            confetti.style.transition = 'opacity 1.5s ease';
                            confetti.style.opacity = '0';
                            setTimeout(() => confetti.remove(), 1500);
                        }, 4000);
                    }
                }, 20);
            }
        }
    </script>

</body>
</html>
