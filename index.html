<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- WhatsApp Preview Meta Tags -->
    <title>Shambhavi's Annaprashan Invitation</title>
    <meta property="og:title" content="Shambhavi's Annaprashan Invitation 🌸">
    <meta property="og:description" content="✉️ Tap to open your interactive invitation envelope and view the venue location!">
    <meta property="og:image" content="https://spandanmhr-ops.github.io/Shambhavi-invitation/watermarked_img_10522389305830531999_2.png">
    <meta property="og:url" content="https://spandanmhr-ops.github.io/Shambhavi-invitation/">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg-color: #f7e6e9;
            --envelope-bg: #f2cbd2;
            --envelope-inside: #e0a3ad;
            --btn-color: #c46274;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at center, #fff2f4 0%, #fbe3e7 60%, #f2cbd2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Responsive Background Mandalas */
        .bg-pattern-left, .bg-pattern-right {
            position: absolute;
            width: 50vmax;
            height: 50vmax;
            border: 2.5px dashed rgba(196, 98, 116, 0.16);
            border-radius: 50%;
            pointer-events: none;
        }
        .bg-pattern-left {
            top: -20vmax; left: -20vmax;
            animation: slowRotate 35s infinite linear;
        }
        .bg-pattern-right {
            bottom: -20vmax; right: -20vmax;
            animation: slowRotateReverse 42s infinite linear;
        }
        .bg-pattern-left::before, .bg-pattern-right::before {
            content: "🌸 ✨ 🌸 🌟 🌸 ✨ 🌸 🌟";
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2vmax;
            letter-spacing: 3vmax;
            opacity: 0.28;
            color: var(--btn-color);
        }

        @keyframes slowRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slowRotateReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .bg-sparkle {
            position: absolute;
            background: rgba(179, 78, 96, 0.55);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 8s infinite linear;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.4); opacity: 0; }
            25% { opacity: 0.85; }
            75% { opacity: 0.85; }
            100% { transform: translateY(-10vh) scale(1.4); opacity: 0; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            height: 100%;
            padding-bottom: 8vh;
            box-sizing: border-box;
            z-index: 5;
            position: relative;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            cursor: pointer;
            transition: transform 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--envelope-inside);
            z-index: 1;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px rgba(196,98,116,0.3);
        }

        .card-container {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 290px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            overflow: hidden;
            text-align: center;
            z-index: 2;
            opacity: 0;
            transform: translateY(10px) scale(0.9);
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
        }

        .invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .action-area {
            padding: 12px 10px;
            background: #fff8f9;
            border-top: 1px solid #f2d6db;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #c46274 0%, #b34e60 100%);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(196,98,116,0.4);
        }

        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #f4cbd2;
            clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
            z-index: 3;
            border-radius: 0 0 10px 10px;
            pointer-events: none;
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--envelope-bg);
            clip-path: polygon(0 0, 50% 52%, 100% 0, 100% 4%, 0 4%);
            transform-origin: top;
            z-index: 4;
            transition: transform 0.5s ease, z-index 0.2s ease;
        }

        .heart-seal {
            position: absolute;
            top: 43%;
            left: 50%;
            width: 36px;
            height: 36px;
            margin-left: -18px;
            background: linear-gradient(135deg, #c46274 0%, #9e3f50 100%);
            transform: rotate(-45deg);
            z-index: 5;
            transition: all 0.3s ease;
            box-shadow: -4px 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .heart-seal::before, .heart-seal::after {
            content: "";
            position: absolute;
            width: 36px;
            height: 36px;
            background: inherit;
            border-radius: 50%;
        }
        .heart-seal::before { top: -18px; left: 0; }
        .heart-seal::after { left: 18px; top: 0; }

        .shimmer-line {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: gleamTrack 3.2s infinite ease-in-out;
            z-index: 6;
            pointer-events: none;
        }

        @keyframes gleamTrack {
            0% { transform: translate(-100%, -100%) rotate(45deg); }
            100% { transform: translate(100%, 100%) rotate(45deg); }
        }

        .tap-text {
            position: absolute;
            bottom: -45px;
            width: 100%;
            text-align: center;
            color: var(--btn-color);
            font-weight: bold;
            font-size: 15px;
            z-index: 10;
            animation: subtleBounce 2s infinite ease-in-out;
        }

        @keyframes subtleBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .heart-seal {
            opacity: 0;
            transform: scale(0);
        }

        .envelope-wrapper.reveal-card .card-container {
            display: block;
        }

        .envelope-wrapper.slide-card .card-container {
            transform: translateY(-290px) scale(1.0);
            z-index: 10;
            pointer-events: auto;
            opacity: 1;
        }

        .envelope-wrapper.open .tap-text {
            display: none;
        }

        .confetti {
            position: absolute;
            width: 9px;
            height: 9px;
            z-index: 99;
            border-radius: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-pattern-left"></div>
    <div class="bg-pattern-right"></div>

    <div class="container">
        <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
            <div class="envelope-back"></div>
            <div class="flap"></div>
            <div class="envelope-front"></div>
            
            <div class="heart-seal">
                <div class="shimmer-line"></div>
            </div>
            
            <div class="tap-text">✉️ Tap to open invitation</div>

            <div class="card-container" id="invitationCard" onclick="event.stopPropagation();">
                <a href="https://maps.app.goo.gl/1VX1vhAUfNKH4Dqk6?g_st=iw" target="_blank">
                    <!-- Configured seamlessly to point to the new asset file path name -->
                    <img src="watermarked_img_10522389305830531999_2.png" 
                         onerror="this.onerror=null; this.src='watermarked_img_10522389305830531999_2.PNG';" 
                         alt="Invitation" 
                         class="invitation-img">
                </a>
                <div class="action-area">
                    <a href="https://maps.app.goo.gl/1VX1vhAUfNKH4Dqk6?g_st=iw" target="_blank" class="btn">📍 Open Google Maps</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const colors = ['#c46274', '#e0a3ad', '#b34e60', '#f4cbd2'];
            for (let i = 0; i < 16; i++) {
                const particle = document.createElement('div');
                particle.classList.add('bg-sparkle');
                const size = Math.random() * 15 + 8;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = Math.random() * 4 + 6 + 's';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(particle);
            }
        });

        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            if (envelope.classList.contains('open')) return;
            
            envelope.classList.add('open');
            
            setTimeout(() => {
                envelope.classList.add('reveal-card');
                setTimeout(() => {
                    envelope.classList.add('slide-card');
                }, 50);
            }, 150);

            setTimeout(createConfettiBurst, 250);
        }

        function createConfettiBurst() {
            const colors = ['#e76f51', '#f4a261', '#2a9d8f', '#e9c46a', '#c46274', '#9e3f50'];
            const burstCount = 110;

            for (let i = 0; i < burstCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                if (Math.random() > 0.4) confetti.style.borderRadius = '50%';
                
                const rect = document.getElementById('envelope').getBoundingClientRect();
                confetti.style.left = (rect.left + rect.width / 2) + 'px';
                confetti.style.top = (rect.top + rect.height / 2) + 'px';
                document.body.appendChild(confetti);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 6 + Math.random() * 15;
                let xSpeed = Math.cos(angle) * velocity;
                let ySpeed = Math.sin(angle) * velocity - 13;
                
                let currentX = rect.left + rect.width / 2;
                let currentY = rect.top + rect.height / 2;
                const rotationSpeed = (Math.random() - 0.5) * 50;
                let currentRotation = Math.random() * 360;

                const interval = setInterval(() => {
                    ySpeed += 0.45;
                    xSpeed *= 0.96;
                    currentX += xSpeed;
                    currentY += ySpeed;
                    currentRotation += rotationSpeed;

                    confetti.style.left = currentX + 'px';
                    confetti.style.top = currentY + 'px';
                    confetti.style.transform = `rotate(${currentRotation}deg)`;

                    if (currentY >= window.innerHeight - 15) {
                        clearInterval(interval);
                        confetti.style.top = (window.innerHeight - 12) + 'px';
                        setTimeout(() => {
                            confetti.style.transition = 'opacity 1s ease';
                            confetti.style.opacity = '0';
                            setTimeout(() => confetti.remove(), 1000);
                        }, 3500);
                    }
                }, 20);
            }
        }
    </script>

</body>
</html>
