    <style>
        :root {
            --bg-color: #f7e6e9;
            --envelope-bg: #f2cbd2;
            --envelope-inside: #e0a3ad;
            --btn-color: #c46274;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .envelope-wrapper {
            position: relative;
            width: 340px;
            height: 240px;
            cursor: pointer;
            margin-top: 260px;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--envelope-inside);
            z-index: 1;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card-container {
            position: absolute;
            top: 10px;
            left: 20px;
            width: 300px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            z-index: 2;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
            transform: translateY(120px) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }

        .invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .action-area {
            padding: 12px 10px;
            background: #fff8f9;
            border-top: 1px solid #f2d6db;
        }

        .btn {
            display: inline-block;
            background-color: var(--btn-color);
            color: #fff;
            text-decoration: none;
