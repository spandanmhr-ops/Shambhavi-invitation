<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shambhavi's Annaprashan Invitation</title>
    <style>
        :root {
            --bg-color: #f7e6e9;
            --envelope-bg: #f2cbd2;
            --envelope-inside: #e0a3ad;
            --btn-color: #c46274;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Outer Frame to clip the card inside the bottom half */
        .envelope-wrapper {
            position: relative;
            width: 340px;
            height: 240px;
            cursor: pointer;
            margin-top: 240px;
        }

        /* A solid masking block that prevents anything from sticking out the bottom */
        .mask-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: visible; /* Allows the card to rise up top, but masks layers */
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--envelope-inside);
            z-index: 1;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* THE INVITATION CARD (Starts hidden, tucked down safely) */
        .card-container {
            position: absolute;
            top: 0;
            left: 20px;
            width: 300px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            z-index: 2;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateY(10px); /* Pushed completely down into the pouch */
            pointer-events: none;
            opacity: 0; /* Keeps it unseen until opened */
        }

        .invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .action-area {
            padding: 12px 10px;
            background: #fff8f9;
            border-top: 1px solid #f2d6db;
        }

        .btn {
            display: inline-block;
            background-color: var(--btn-color);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
        }

        /* FRONT DESIGN FLAPS */
        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            top: 0;
            left: 0;
            border-left: 170px solid #f9dae0;
            border-right: 170px solid #f9dae0;
            border-bottom: 120px solid #f4cbd2;
            border-top: 120px solid transparent;
            z-index: 4; /* Higher than the card container */
            border-radius: 0 0 10px 10px;
            pointer-events: none;
        }

        /* TOP SEAL FLAP */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 130px solid var(--envelope-bg);
            transform-origin: top;
            z-index: 5;
            transition: transform 0.4s ease, z-index 0.2s ease;
        }

        /* HEART STICKER */
        .heart-seal {
            position: absolute;
            top: 110px;
            left: 153px;
            width: 34px;
            height: 34px;
            background-color: var(--btn-color);
            transform: rotate(-45deg);
            z-index: 6;
            transition: all 0.3s ease;
        }
        .heart-seal::before, .heart-seal::after {
            content: "";
            position: absolute;
            width: 34px;
            height: 34px;
            background-color: var(--btn-color);
            border-radius: 50%;
        }
        .heart-seal::before { top: -17px; left: 0; }
        .heart-seal::after { left: 17px; top: 0; }

        .tap-text {
            position: absolute;
            bottom: -45px;
            width: 100%;
            text-align: center;
            color: var(--btn-color);
            font-weight: bold;
            font-size: 15px;
            z-index: 10;
        }

        /* --- CLICKED TRANSFORMS --- */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .heart-seal {
            opacity: 0;
            transform: scale(0);
        }

        .envelope-wrapper.open .card-container {
            transform: translateY(-390px) scale(1.05); /* Slides upward gracefully */
            z-index: 10;
            pointer-events: auto;
            opacity: 1;
        }

        .envelope-wrapper.open .tap-text {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
            <div class="mask-layer">
                <div class="envelope-back"></div>
                <div class="flap"></div>
                <div class="envelope-front"></div>
                <div class="heart-seal"></div>
                <div class="tap-text">✉️ Tap to open invitation</div>

                <!-- Invitation Pouch Contents -->
                <div class="card-container" onclick="event.stopPropagation();">
                    <a href="https://www.google.com/maps/search/?api=1&query=Bidyadharpur+Puja+Mandap+Cuttack" target="_blank">
                        <img src="watermarked_img_10522389305830531999.png" alt="Invitation" class="invitation-img">
                    </a>
                    <div class="action-area">
                        <a href="https://www.google.com/maps/search/?api=1&query=Bidyadharpur+Puja+Mandap+Cuttack" target="_blank" class="btn">📍 Open Google Maps</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            document.getElementById('envelope').classList.add('open');
        }
    </script>

</body>
</html>
