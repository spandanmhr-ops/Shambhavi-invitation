<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shambhavi's Annaprashan Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7e6e9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            text-align: center;
        }
        .invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .action-area {
            padding: 25px 20px;
            background: #fff8f9;
            border-top: 1px solid #f2d6db;
        }
        .btn {
            display: inline-block;
            background-color: #c46274;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            padding: 14px 32px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(196,98,116,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <a href="https://maps.app.goo.gl/Hr65bXEkaG5ue23RA" target="_blank">
            <img src="https://images.gemini.googleusercontent.com/image_generation_content/295" alt="Invitation" class="invitation-img">
        </a>
        <div class="action-area">
            <a href="https://maps.app.goo.gl/Hr65bXEkaG5ue23RA" target="_blank" class="btn">📍 Open Google Maps</a>
        </div>
    </div>
</body>
</html>
